<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Album Cover Finder</title>
</head>
<body>
  <div class="container">
    <div class="left">
      <h1>Album Cover Finder</h1>
      <h2>Write down the name of your song</h2>

      <input type="text" id="songInput" placeholder="Enter song..." />
      <button onclick="searchSong()">Search</button>
    </div>

    <div class="right">
      <img id="cover" src="hello.png" alt="album cover"/>
      <button id="saveBtn">Save</button>
    </div>
  </div>

<div class="saved-section">
  <h2>Saved</h2>
  <div id="savedContainer"></div>
</div>

  <script src="script.js"></script>
</body>
</html>
